<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0d0f14"/>

  <!-- Subtle speed-line accent -->
  <rect x="48" y="290" width="80" height="8" rx="4" fill="#00e5ff" opacity="0.18"/>
  <rect x="32" y="314" width="56" height="8" rx="4" fill="#00e5ff" opacity="0.12"/>

  <!-- Running figure (solid silhouette, cyan) -->
  <!-- Head -->
  <circle cx="318" cy="112" r="36" fill="#00e5ff"/>

  <!-- Body / torso -->
  <path d="M294 148 C278 170 265 198 268 228 L290 228 C288 208 298 184 312 164 Z" fill="#00e5ff"/>
  <path d="M318 148 C336 170 352 196 348 226 L326 224 C330 202 322 176 306 158 Z" fill="#00e5ff"/>

  <!-- Left arm (swinging forward-up) -->
  <path d="M280 162 C262 148 238 132 218 118" stroke="#00e5ff" stroke-width="26" stroke-linecap="round" fill="none"/>

  <!-- Right arm (swinging back-down) -->
  <path d="M340 168 C362 180 386 196 406 214" stroke="#00e5ff" stroke-width="26" stroke-linecap="round" fill="none"/>

  <!-- Left leg (forward stride) -->
  <path d="M278 222 C264 258 246 288 216 316" stroke="#00e5ff" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Left lower leg -->
  <path d="M216 316 C204 344 206 372 214 394" stroke="#00e5ff" stroke-width="24" stroke-linecap="round" fill="none"/>
  <!-- Left foot -->
  <path d="M214 394 C218 402 238 406 262 402" stroke="#00e5ff" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Right leg (back push-off) -->
  <path d="M330 224 C346 260 360 290 374 308" stroke="#00e5ff" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Right lower leg (bent up behind) -->
  <path d="M374 308 C388 290 400 268 408 248" stroke="#00e5ff" stroke-width="24" stroke-linecap="round" fill="none"/>
  <!-- Right foot -->
  <path d="M408 248 C418 242 430 244 438 252" stroke="#00e5ff" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Glow ring around head -->
  <circle cx="318" cy="112" r="44" fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.25"/>
</svg>
